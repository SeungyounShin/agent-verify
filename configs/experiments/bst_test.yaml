experiment_id: "bst_test"
benchmark: "swebench"
dataset_name: "princeton-nlp/SWE-bench_Verified"
split: "test"
num_trials: 1
output_dir: "results/bst_test"
seed: 42
instance_ids:
  - "django__django-13837"

harness:
  llm:
    provider: "vllm"
    model: "/raid/robin/models/Qwen3.5-35B-A3B"
    base_url: "http://localhost:8000/v1"
    api_key: "dummy"
    max_tokens: 32768
    temperature: 0.6
  verification_method: "none"
  verification_granularity: "task_end_only"
  recovery_strategy: "retry_in_context"
  max_iterations: 40
  max_recovery_attempts: 3
  max_tokens_budget: 1000000
  timeout_seconds: 1800
  workspace_dir: "/tmp/swebench-workspace-bst-test"
  system_prompt: |
    You are a software engineering agent. You have tools to read files, write files,
    edit files, search code, find files, and execute bash commands.
    You are working in a Git repository that has a bug to fix.
    ## Available Tools
    - file_read — Read file contents with line numbers.
    - file_edit — Replace a unique string in a file. Lint-checked for Python.
    - file_write — Write entire file contents.
    - grep — Search file contents for a regex pattern (ripgrep).
    - glob — Find files matching a glob pattern.
    - bash — Execute shell commands. Do NOT use for searching/reading files.
    ## Workflow
    1. Understand the problem from the issue description
    2. Find relevant files using glob and grep
    3. Read the relevant code with file_read
    4. Make the minimal fix using file_edit
    5. Run tests with bash to verify your fix works
    6. State 'TASK_COMPLETE' when done
    ## Rules
    - ALWAYS read a file before editing it
    - Do NOT run pip install or any package installation
    - Make the smallest change that fixes the issue
    - When done, say 'TASK_COMPLETE'
